<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confused Deputy Showcase</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <section class="pane pane-chat">
        <header class="pane-header">
          <div>
            <p class="eyebrow">Acme Corp</p>
            <h1>AI Assistant</h1>
          </div>
          <div class="header-controls">
            <button id="new-chat-button" class="button-secondary" type="button">New chat</button>
            <div class="status-group">
              <div class="model-picker">
                <button id="model-button" class="button-secondary model-button" type="button" aria-haspopup="dialog" aria-expanded="false">
                  <span id="model-label">Model</span>
                </button>
                <div id="model-popup" class="model-popup" hidden>
                  <p class="model-popup-title">Select model</p>
                  <select id="model-select" aria-label="Available models"></select>
                  <button id="model-apply-button" class="button-secondary" type="button">Apply model</button>
                </div>
              </div>
              <button id="provider-badge" class="provider-toggle button-secondary" type="button">
                <span id="provider-label">OpenAI</span>
              </button>
              <div class="capability-picker">
                <button id="capability-button" class="capability-toggle button-secondary" type="button" aria-haspopup="dialog" aria-expanded="false">
                  <span id="capability-label">Capabilities</span>
                </button>
                <div id="capability-popup" class="model-popup capability-popup" hidden>
                  <div class="popup-header">
                    <p class="model-popup-title">Capabilities</p>
                    <div class="popup-actions">
                      <button id="capability-insecure-button" class="button-secondary popup-insecure-button" type="button">Insecure</button>
                      <button id="capability-close-button" class="button-secondary popup-close-button" type="button">Close</button>
                    </div>
                  </div>
                  <div id="capability-list" class="capability-list" role="group" aria-label="Capability selection"></div>
                </div>
              </div>
            </div>
          </div>
        </header>

        <div id="chat-log" class="chat-log"></div>

        <form id="chat-form" class="chat-form">
          <textarea id="chat-input" placeholder="Type a message..." rows="3"></textarea>
          <button id="send-button" type="submit">Send</button>
        </form>

        <div class="quick-actions">
          <button data-prompt="Summarize my new emails">Summarize emails</button>
          <button data-prompt="Check my calendar and flag anything unusual">Check calendar</button>
          <button data-prompt-key="safe-webpage">Safe webpage</button>
          <button data-prompt-key="malicious-webpage">Malicious webpage</button>
        </div>

        <div id="shield-overlay" class="shield-overlay" hidden>
          <img src="/assets/shield.svg" alt="Shield" />
          <div>
            <strong>Blocked by policy</strong>
            <p id="shield-message">A risky action was blocked.</p>
          </div>
        </div>
      </section>

      <section class="pane pane-monitor">
        <header class="pane-header monitor-header">
          <div>
            <p class="eyebrow">Live Feed</p>
            <h2>System Monitor</h2>
          </div>
        </header>

        <div id="exfil-banner" class="banner banner-danger" hidden>[EXFILTRATED] Data left the system</div>
        <div id="monitor-log" class="monitor-log"></div>
      </section>
    </div>

    <script src="/static/app.js" defer></script>
  </body>
</html>
