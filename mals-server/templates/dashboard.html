<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attacker Dashboard</title>
    <style>
      body {
        margin: 0;
        font-family: Consolas, monospace;
        background: #050505;
        color: #ff4d4f;
        padding: 24px;
      }
      h1 {
        margin-top: 0;
      }
      .banner {
        padding: 12px 16px;
        border: 1px solid rgba(255, 77, 79, 0.45);
        background: rgba(255, 77, 79, 0.1);
        border-radius: 12px;
        margin-bottom: 20px;
      }
      .header-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }
      .header-row h1 {
        margin: 0;
      }
      .clear-button {
        border: 1px solid rgba(255, 77, 79, 0.45);
        background: rgba(255, 77, 79, 0.12);
        color: #ffb3b4;
        border-radius: 10px;
        padding: 10px 14px;
        font: inherit;
        cursor: pointer;
      }
      .clear-button:hover {
        background: rgba(255, 77, 79, 0.2);
      }
      .clear-button:disabled {
        cursor: wait;
        opacity: 0.65;
      }
      .entry {
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 12px;
        background: rgba(255, 255, 255, 0.03);
      }
      .entry summary,
      .entry pre {
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .decoded-label {
        margin: 10px 0 4px;
        color: #ff9a9b;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      pre {
        white-space: pre-wrap;
        margin: 8px 0 0;
      }
    </style>
  </head>
  <body>
    <div class="banner">ATTACKER'S DATA COLLECTION SERVER</div>
    <div class="header-row">
      <h1>Live Exfil Feed</h1>
      <button id="clear-button" class="clear-button" type="button">Clear feed</button>
    </div>
    <div id="feed"></div>

    <script>
      const feed = document.getElementById("feed");
      const clearButton = document.getElementById("clear-button");
      const seenEvents = new Set();
      let reconnectTimer = null;
      let socket = null;

      function eventKey(event) {
        return JSON.stringify([
          event.timestamp || "",
          event.method || "",
          event.url || "",
          event.body || "",
          event.payload || null,
        ]);
      }

      function decodeUrlString(url) {
        if (!url) {
          return "";
        }
        try {
          return decodeURIComponent(url);
        } catch (error) {
          console.warn("Failed to decode URL", url, error);
          return url;
        }
      }

      function render(event) {
        const key = eventKey(event);
        if (seenEvents.has(key)) {
          return;
        }
        seenEvents.add(key);

        const wrapper = document.createElement("details");
        wrapper.className = "entry";
        wrapper.open = true;

        const summary = document.createElement("summary");
        summary.textContent = `${event.timestamp} - ${event.method} ${event.url}`;
        wrapper.appendChild(summary);

        const decodedUrl = decodeUrlString(event.url);
        if (decodedUrl && decodedUrl !== event.url) {
          const decodedLabel = document.createElement("div");
          decodedLabel.className = "decoded-label";
          decodedLabel.textContent = "Decoded URL";
          wrapper.appendChild(decodedLabel);

          const decodedPre = document.createElement("pre");
          decodedPre.textContent = decodedUrl;
          wrapper.appendChild(decodedPre);
        }

        const pre = document.createElement("pre");
        pre.textContent = JSON.stringify(event, null, 2);
        wrapper.appendChild(pre);

        feed.prepend(wrapper);
      }

      function clearFeed() {
        seenEvents.clear();
        feed.textContent = "";
      }

      async function refreshHistory() {
        const response = await fetch("/api/events");
        if (!response.ok) {
          throw new Error(`Event fetch failed with status ${response.status}`);
        }
        const history = await response.json();
        history.forEach(render);
      }

      function scheduleReconnect() {
        if (reconnectTimer) {
          return;
        }
        reconnectTimer = window.setTimeout(() => {
          reconnectTimer = null;
          connectSocket();
        }, 1500);
      }

      function connectSocket() {
        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        socket = new WebSocket(`${protocol}://${window.location.host}/ws`);
        socket.onopen = () => socket.send("ready");
        socket.onmessage = (event) => {
          const payload = JSON.parse(event.data);
          if (payload.type === "cleared") {
            clearFeed();
            return;
          }
          render(payload);
        };
        socket.onerror = () => socket.close();
        socket.onclose = () => scheduleReconnect();
      }

      async function init() {
        await refreshHistory();
        connectSocket();
      }

      window.addEventListener("beforeunload", () => {
        if (reconnectTimer) {
          window.clearTimeout(reconnectTimer);
        }
        if (socket) {
          socket.close();
        }
      });

      clearButton.addEventListener("click", async () => {
        clearButton.disabled = true;
        try {
          const response = await fetch("/api/events/clear", { method: "POST" });
          if (!response.ok) {
            throw new Error(`Clear failed with status ${response.status}`);
          }
          clearFeed();
        } catch (error) {
          console.error("Failed to clear exfil dashboard", error);
        } finally {
          clearButton.disabled = false;
        }
      });

      void init().catch((error) => {
        console.error("Failed to initialize exfil dashboard", error);
      });
    </script>
  </body>
</html>
