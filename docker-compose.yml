services:
  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    env_file:
      - .env
    environment:
      ALICE_EMAIL: ${ALICE_EMAIL:-alice.zhang@acmecorp.com}
      BOB_EMAIL: ${BOB_EMAIL:-bob.chen@acmecorp.com}
      MAL_EMAIL: ${MAL_EMAIL:-mal@evil.com}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AGENT_ENGINE: ${AGENT_ENGINE:-offline}
      USE_MOCK_DATA: ${USE_MOCK_DATA:-1}
      CONTENT_SERVER_URL: ${CONTENT_SERVER_URL:-http://content-server:8081}
      EXFIL_SERVER_URL: ${EXFIL_SERVER_URL:-http://mals-server:8082}
    extra_hosts:
      - "mals-server:host-gateway"
    volumes:
      - ./mock-data:/app/mock-data:ro
      - ./frontend:/app/frontend:ro
      - ./dummy.env:/app/.env:ro
      - ./agent/safe:/app/safe:ro
    ports:
      - "8000:8000"
    depends_on:
      - content-server
      - mals-server

  content-server:
    build: ./content-server
    ports:
      - "8081:8081"

  mals-server:
    build: ./mals-server
    ports:
      - "8082:8082"
