services:
  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    env_file:
      - .env
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AGENT_ENGINE: ${AGENT_ENGINE:-offline}
      INSECURE: ${INSECURE:-1}
      USE_MOCK_DATA: ${USE_MOCK_DATA:-1}
      CURRENT_ACT: ${CURRENT_ACT:-1}
      CONTENT_SERVER_URL: ${CONTENT_SERVER_URL:-http://content-server:8081}
      EXFIL_SERVER_URL: ${EXFIL_SERVER_URL:-http://exfil-server:8082}
    volumes:
      - ./mock-data:/app/mock-data:ro
      - ./frontend:/app/frontend:ro
      - ./dummy.env:/app/dummy.env:ro
      - ./agent/safe:/app/safe:ro
    ports:
      - "8000:8000"
    depends_on:
      - content-server
      - exfil-server

  content-server:
    build: ./content-server
    ports:
      - "8081:8081"

  exfil-server:
    build: ./exfil-server
    ports:
      - "8082:8082"
