<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attacker Dashboard</title>
    <style>
      body {
        margin: 0;
        font-family: Consolas, monospace;
        background: #050505;
        color: #ff4d4f;
        padding: 24px;
      }
      h1 {
        margin-top: 0;
      }
      .banner {
        padding: 12px 16px;
        border: 1px solid rgba(255, 77, 79, 0.45);
        background: rgba(255, 77, 79, 0.1);
        border-radius: 12px;
        margin-bottom: 20px;
      }
      .entry {
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 12px;
        background: rgba(255, 255, 255, 0.03);
      }
      pre {
        white-space: pre-wrap;
        margin: 8px 0 0;
      }
    </style>
  </head>
  <body>
    <div class="banner">ATTACKER'S DATA COLLECTION SERVER</div>
    <h1>Live Exfil Feed</h1>
    <div id="feed"></div>

    <script>
      const feed = document.getElementById("feed");

      function render(event) {
        const wrapper = document.createElement("details");
        wrapper.className = "entry";
        wrapper.open = true;
        wrapper.innerHTML = `
          <summary>${event.timestamp} - ${event.method} ${event.url}</summary>
          <pre>${JSON.stringify(event, null, 2)}</pre>
        `;
        feed.prepend(wrapper);
      }

      async function init() {
        const history = await fetch("/api/events").then((res) => res.json());
        history.forEach(render);

        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        const socket = new WebSocket(`${protocol}://${window.location.host}/ws`);
        socket.onopen = () => socket.send("ready");
        socket.onmessage = (event) => render(JSON.parse(event.data));
      }

      init();
    </script>
  </body>
</html>
